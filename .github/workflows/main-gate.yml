name: Main Gate

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile (Java 25)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Compile and package (no tests)
        run: ./mvnw -q -B -DskipTests -Dspotbugs.skip=true clean package

  smoke:
    name: Smoke (min workload)
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ordinary usage smoke test
        run: ./mvnw -q -B -pl rmatch -Dtest=no.rmz.rmatch.ordinaryuse.OrdinaryUsageSmokeTest test

      - name: Wuthering Heights tiny corpus smoke
        run: >
          ./mvnw -q -B -pl rmatch-tester -am
          -Dtest=SequenceLoaderTest#testWutheringHeightsCorpusWithVeryFewRegexps
          -Dsurefire.failIfNoSpecifiedTests=false
          test
